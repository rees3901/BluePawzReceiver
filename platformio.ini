; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; V3 receiver targets the Heltec Wireless Tracker V2 (HTIT-Tracker_V2.3).
; The arduino-esp32 'heltec_wireless_tracker' variant covers both V1 and V2 —
; they share the ESP32-S3FN8 + SX1262 + ST7735 layout. V2 added the UC6580
; GNSS @115200, improved RF, and an active antenna.
[env:heltec_wireless_tracker_v2]
platform = espressif32
board = heltec_wireless_tracker
framework = arduino

board_build.flash_mode = dio ; Required for compatibility with PSRAM
board_build.flash_size = 8MB
board_build.partitions = partitions_8MB_bigfs.csv
board_build.filesystem = littlefs

build_flags =
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue

monitor_speed = 115200

; Default to USB upload. To push OTA instead, run:
;   pio run -t upload --upload-port cattracker.local
; or uncomment the two lines below.
; upload_protocol = espota
; upload_port = cattracker.local

lib_deps =
	bblanchon/ArduinoJson @ ^7.3.1
	jgromes/RadioLib @ ^7.1.2
	links2004/WebSockets@^2.6.1
	mikalhart/TinyGPSPlus@^1.1.0
	adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
	adafruit/Adafruit GFX Library @ ^1.11.10

