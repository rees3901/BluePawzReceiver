; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; V3 receiver targets the Heltec Wireless Tracker V2 (HTIT-Tracker_V2.3).
;
; NOTE on the board definition:
;   PlatformIO's platform-espressif32 (7.x as of this writing) does NOT
;   ship a board definition for the Wireless Tracker V2 yet. To keep the
;   project self-contained we ship our own at boards/heltec_wireless_tracker_v2.json
;   — that's why `board = heltec_wireless_tracker_v2` works here even though
;   `pio boards heltec` won't list it. PlatformIO scans the project's boards/
;   folder before falling back to the platform's built-in board list.
;
;   The custom board JSON is based on heltec_wifi_lora_32_V3 (same ESP32-S3 +
;   8 MB flash class) with name + extra_flags adjusted. If a future PIO
;   platform update ships an official heltec_wireless_tracker board, you can
;   delete boards/heltec_wireless_tracker_v2.json and change `board = ` to
;   `heltec_wireless_tracker` — pin definitions in main.cpp don't depend on
;   the variant header so it's a clean swap.
[env:heltec_wireless_tracker_v2]
platform = espressif32
board = heltec_wireless_tracker_v2
framework = arduino

; Heltec V2 uses the ESP32-S3FN8 chip — 8 MB flash, NO PSRAM (the FN8
; suffix is the giveaway). Earlier versions of platformio.ini carried
; -DBOARD_HAS_PSRAM + -mfix-esp32-psram-cache-issue inherited from the
; transmitter's XIAO config (XIAO ESP32-S3 *does* have PSRAM). On the
; V2 those flags trigger a panic at boot when PSRAM init reads back
; 0xffff0f from a non-existent chip and the bootloader loops.
; If you ever swap in a Heltec V2.X variant with PSRAM, re-add the
; flags — but check the silkscreen first; FN8 = no PSRAM, R8 = PSRAM.
board_build.flash_mode = dio
board_build.flash_size = 8MB
board_build.partitions = partitions_8MB_bigfs.csv
board_build.filesystem = littlefs

build_flags =

monitor_speed = 115200

; Default to USB upload. To push OTA instead, run:
;   pio run -t upload --upload-port cattracker.local
; or uncomment the two lines below.
;upload_protocol = espota
;upload_port = cattracker.local

lib_deps =
	bblanchon/ArduinoJson @ ^7.3.1
	jgromes/RadioLib @ ^7.1.2
	links2004/WebSockets@^2.6.1
	mikalhart/TinyGPSPlus@^1.1.0
	adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
	adafruit/Adafruit GFX Library @ ^1.11.10

